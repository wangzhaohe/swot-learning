<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>querySelector 示例</title>
</head>
<body>
<!-- 定义一个密码框（默认显示黑点）和一个按钮 -->
<input type="password" id="pwd" value="123456">
<button id="btn">显示密码</button>

<script>
// 获取密码框对象 和 按钮对象
let pwd = document.querySelector('#pwd');
let btn = document.querySelector('#btn');

let flag = true; // true 表示当前是密码状态

//  直接使用 onclick 进行点击事件的绑定
// onclick 只能绑定一次事件，在实际开发中如果需要绑定多个事件，请使用 addEventListener
btn.onclick = function() {
    if (flag) {
        pwd.type = 'text'; // 变成文本
        btn.innerText = '隐藏密码';
    } else {
        pwd.type = 'password'; // 变成黑点点
        btn.innerText = '显示密码';
    }
    flag = !flag; // 状态取反
};
</script>
</body>
</html>
