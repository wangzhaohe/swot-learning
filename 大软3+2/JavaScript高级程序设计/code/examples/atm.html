<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>简易 ATM 取款机（循环版）</title>
    <script>
        let balance = 1000;

        while (true) { // 死循环，一直运行
            let choice = prompt("请选择操作：\n1. 查询余额\n2. 存款\n3. 取款\n4. 退出");

            if (choice === "1") {
                alert(`您的余额为：${balance}元`);
            }
            else if (choice === "2") {
                let money = parseFloat(prompt("请输入存款金额："));
                balance += money;
                alert(`存款成功！余额：${balance}`);
            }
            else if (choice === "3") {
                let money = parseFloat(prompt("请输入取款金额："));
                if (money > balance) {
                    alert("余额不足！");
                } else {
                    balance -= money;
                    alert(`取款成功！余额：${balance}`);
                }
            }
            else if (choice === "4") {
                alert("感谢使用，再见！");
                break; // 退出死循环
            }
            else {
                alert("输入错误，请重试！");
            }
        }
    </script>
</head>
<body>
    <h1>简易 ATM 取款机（循环版）运行中...</h1>
</body>
</html>
