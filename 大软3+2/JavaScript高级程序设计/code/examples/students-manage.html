<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>学员名单管理系统</title>
<body>
    <script>
        let students = ['张三', '李四'];
        let name;

        while (true) {
            // prompt 是浏览器的函数，需要在浏览器环境中执行
            let action = prompt(
                `请选择操作：
                1. 查看名单
                2. 添加学员(末尾)
                3. 删除学员(姓名)
                4. 退出`
            );
            if (action === '1') {
                alert("当前学员：" + students.join('、'));
            } else if (action === '2') {
                name = prompt("请输入新学员姓名：");
                students.push(name);
                alert("添加成功！");
            } else if (action === '3') {
                name = prompt("请输入要删除的学员姓名：");
                let index = students.indexOf(name); // 查找索引
                // let index = students.indexOf("张三"); // 查找索引
                console.log('index:', index);
                if (index !== -1) {
                    // 删除索引 index 对应的元素，只删除 1 个
                    students.splice(index, 1);
                    alert("删除成功！");
                } else {
                    alert("查无此人！");
                }
            } else if (action === '4') {
                break;
            }
        }
    </script>
</body>
</head>
</html>
